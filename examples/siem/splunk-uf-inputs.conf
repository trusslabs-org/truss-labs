# Example: Splunk Universal Forwarder inputs.conf
# Install under $SPLUNK_HOME/etc/system/local/inputs.conf or an app-local inputs.conf.

[monitor:///var/truss/receipts/*/*.json]
disabled = false
index = security
sourcetype = truss_receipt_v1
crcSalt = <SOURCE>
recursive = false

# Recommended props on the indexer/search head:
# [truss_receipt_v1]
# INDEXED_EXTRACTIONS = json
# KV_MODE = json
# TIME_PREFIX = "timestamp"\\s*:\\s*"
# TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%QZ
