# Example: tail Truss receipt files with rsyslog imfile.
# Adjust the InputFileName path for your deployment.

module(load="imfile")

input(
  type="imfile"
  File="/var/truss/receipts/*/*.json"
  Tag="truss-receipt:"
  Facility="local6"
  Severity="info"
  PersistStateInterval="100"
  ReadMode="2"
)

# Forward to a local or remote collector. Replace host/port as needed.
local6.* @@siem-collector.example.internal:514
