<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      /* Dark Theme Design Tokens aligned with www/src/styles/tokens.css */
      --sys-color-bg:                 #0a0a0a;
      --sys-color-surface:            #141414;
      --sys-color-surface-variant:    #1c1c1c;
      --sys-color-text:               #e0e0e0;
      --sys-color-text-dim:           #888888;
      --sys-color-accent:             #ff9966; /* Peach Coral */
      --sys-color-border:             rgba(255, 255, 255, 0.1);
      
      --sys-color-status-ok:          #4ade80;
      --sys-color-status-warn:        #fbbf24;
      --sys-color-status-err:         #ef4444;

      --sys-font-mono:                "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    body {
      width: 290px;
      padding: 16px;
      font-family: var(--sys-font-mono);
      margin: 0;
      background: var(--sys-color-bg);
      color: var(--sys-color-text);
    }
    h2 {
      margin-top: 0;
      font-size: 15px;
      font-weight: 700;
      color: var(--sys-color-accent);
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--sys-color-border);
      padding-bottom: 8px;
    }
    .status-box {
      background: var(--sys-color-surface);
      border: 1px solid var(--sys-color-border);
      border-radius: 4px;
      padding: 12px;
      font-size: 12px;
      margin-top: 12px;
    }
    .status-label {
      color: var(--sys-color-text-dim);
      margin-bottom: 6px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      background: var(--sys-color-text-dim);
    }
    .connected {
      background: var(--sys-color-status-ok);
      box-shadow: 0 0 8px #4ade80;
    }
    .disconnected {
      background: var(--sys-color-status-err);
      box-shadow: 0 0 8px #ef4444;
    }
    .description {
      font-size: 11px;
      color: var(--sys-color-text-dim);
      line-height: 1.4;
    }
    .footer {
      font-size: 9px;
      color: var(--sys-color-text-dim);
      margin-top: 16px;
      text-align: center;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <h2>🛡️ Truss Audit Layer</h2>
  <div class="description">
    Governing web interactions with chatgpt.com, chat.openai.com, and claude.ai.
  </div>
  
  <div class="status-box">
    <div class="status-label">Proxy Connection:</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">Checking...</span>
    </div>
  </div>

  <div class="footer">
    Truss Labs © 2026
  </div>

  <script src="popup.js"></script>
</body>
</html>
